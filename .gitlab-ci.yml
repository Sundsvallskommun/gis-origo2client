image: docker:stable

stages:
  - Build image
  - push
  - deploy

docker build:
  stage: Build image
  tags:
    - docker
  script:
    - docker info
    - docker build -t docker.sundsvall.se/joh17bla/origo2client .

docker push:
  stage: push
  tags:
    - docker
  script:
    - echo "" | docker login docker.sundsvall.se -u xxx@sundsvall.se --password-stdin
    - docker push docker.sundsvall.se/joh17bla/origo2client

deploy:
  stage: deploy
  tags:
    - ssh
  script:
    - docker-compose -f /srv/docker/docker-compose/origo/docker-compose.yml up -d
